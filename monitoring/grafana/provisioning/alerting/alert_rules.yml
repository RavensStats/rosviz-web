        noDataState: OK
        execErrState: Alerting

      - uid: robot-battery-alert
        title: Robot Low Battery
        condition: threshold
        for: 10s
        annotations:
          summary: 'Robot {{ $labels.robot_id }}: low battery'
          description: 'Battery {{ printf "%.0f" $values.A.Value }}%'
        labels:
          severity: warning
          alert_type: LOW_BATTERY
        data:
          - refId: A
            datasourceUid: prometheus-ds
            relativeTimeRange:
              from: 30
              to: 0
            model:
              expr: (robot_battery_percentage < 20) and on(robot_id) (robot_connection_status == 1)
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: threshold
            datasourceUid: '-100'
            relativeTimeRange:
              from: 30
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [1]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: '-100'
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: threshold
              type: threshold
        noDataState: OK
        execErrState: Alerting

      - uid: robot-connection-alert
        title: Robot Connection Loss
        condition: threshold
        for: 10s
        annotations:
          summary: 'Robot {{ $labels.robot_id }}: connection lost'
          description: 'No sensor data received'
        labels:
          severity: critical
          alert_type: CONNECTION_LOSS
        data:
          - refId: A
            datasourceUid: prometheus-ds
            relativeTimeRange:
              from: 30
              to: 0
            model:
              expr: robot_connection_status == 0
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: threshold
            datasourceUid: '-100'
            relativeTimeRange:
              from: 30
