apiVersion: 1

contactPoints:
  - orgId: 1
    name: alert-webhook
    receivers:
      - uid: alert-webhook-receiver
        type: webhook
        settings:
          url: ${ALERT_WEBHOOK_URL}
          httpMethod: POST
        disableResolveMessage: false

  - orgId: 1
    name: discord
    receivers:
      - uid: discord-receiver
        type: discord
        settings:
          url: ${DISCORD_WEBHOOK_URL}
          message: >-
            **[{{ range .Alerts }}{{ .Labels.severity | upper }}{{ end }}]
            {{ range .Alerts }}{{ .Labels.alert_type }}{{ end }}**
            {{ range .Alerts }}{{ .Annotations.summary }}{{ end }}
            {{ range .Alerts }}{{ .Annotations.description }}{{ end }}
        disableResolveMessage: false

policies:
  - orgId: 1
    receiver: alert-webhook
    group_by: ['robot_id', 'alert_type']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 12h
    routes:
      - receiver: discord
        matchers: []
        continue: false

groups:
  - orgId: 1
    name: robot-thresholds
    folder: Robot Monitoring
    interval: 10s
    rules:
      - uid: robot-collision-alert
        title: Robot Collision Risk
        condition: threshold
        for: 10s
        annotations:
          summary: 'Robot {{ $labels.robot_id }}: collision risk'
          description: 'Min scan range {{ printf "%.2f" $values.A.Value }} m'
        labels:
          severity: critical
          alert_type: COLLISION
        data:
          - refId: A
            datasourceUid: prometheus-ds
            relativeTimeRange:
              from: 30
              to: 0
            model:
              expr: (robot_min_scan_range < on(robot_id) group_left() robot_collision_threshold) and on(robot_id) (robot_connection_status == 1)
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: threshold
            datasourceUid: '-100'
            relativeTimeRange:
              from: 30
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [1]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: '-100'
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: threshold
              type: threshold
        noDataState: OK
        execErrState: Alerting

      - uid: robot-velocity-alert
        title: Robot Velocity Exceeded
        condition: threshold
        for: 10s
        annotations:
          summary: 'Robot {{ $labels.robot_id }}: velocity exceeded'
          description: 'Measured velocity {{ printf "%.2f" $values.A.Value }} m/s or rad/s'
        labels:
          severity: warning
          alert_type: VELOCITY_EXCEEDED
        data:
          - refId: A
            datasourceUid: prometheus-ds
            relativeTimeRange:
              from: 30
              to: 0
            model:
              expr: ((robot_velocity_linear > 0.5) or (robot_velocity_angular > 2.0)) and on(robot_id) (robot_connection_status == 1)
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: threshold
            datasourceUid: '-100'
            relativeTimeRange:
              from: 30
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [1]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: '-100'
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: threshold
              type: threshold
        noDataState: OK
        execErrState: Alerting

      - uid: robot-tilt-alert
        title: Robot Tilt Warning
        condition: threshold
        for: 10s
        annotations:
          summary: 'Robot {{ $labels.robot_id }}: tilt warning'
          description: 'Tilt angle {{ printf "%.1f" $values.A.Value }}°'
        labels:
          severity: critical
          alert_type: TILT_WARNING
        data:
          - refId: A
            datasourceUid: prometheus-ds
            relativeTimeRange:
              from: 30
              to: 0
            model:
              expr: (robot_tilt_angle_deg > 20) and on(robot_id) (robot_connection_status == 1)
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: threshold
            datasourceUid: '-100'
            relativeTimeRange:
              from: 30
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [1]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: '-100'
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: threshold
              type: threshold
        noDataState: OK
        execErrState: Alerting

      - uid: robot-geofence-alert
        title: Robot Geofence Breach
        condition: threshold
        for: 10s
        annotations:
          summary: 'Robot {{ $labels.robot_id }}: geofence breach'
          description: 'Robot outside permitted area'
        labels:
          severity: critical
          alert_type: GEOFENCE_BREACH
        data:
          - refId: A
            datasourceUid: prometheus-ds
            relativeTimeRange:
              from: 30
              to: 0
            model:
              expr: (robot_geofence_status > 0) and on(robot_id) (robot_connection_status == 1)
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: threshold
            datasourceUid: '-100'
            relativeTimeRange:
              from: 30
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [1]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: '-100'
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: threshold
