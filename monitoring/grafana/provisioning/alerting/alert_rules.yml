                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: '-100'
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: threshold
              type: threshold
        noDataState: Alerting
        execErrState: Alerting

      - uid: robot-stall-alert
        title: Robot Motor Stall
        condition: threshold
        for: 10s
        annotations:
          summary: 'Robot {{ $labels.robot_id }}: motor stall'
          description: 'Wheel velocity {{ printf "%.3f" $values.A.Value }} rad/s under active command'
        labels:
          severity: warning
          alert_type: MOTOR_STALL
        data:
          - refId: A
            datasourceUid: prometheus-ds
            relativeTimeRange:
              from: 30
              to: 0
            model:
              expr: (robot_motor_stall_status > 0) and on(robot_id) (robot_connection_status == 1)
