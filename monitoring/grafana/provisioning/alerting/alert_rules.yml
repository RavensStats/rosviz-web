        noDataState: OK
        execErrState: Alerting

      - uid: robot-impact-alert
        title: Robot Impact Detected
        condition: threshold
        for: 10s
        annotations:
          summary: 'Robot {{ $labels.robot_id }}: impact detected'
          description: 'Horizontal acceleration {{ printf "%.1f" $values.A.Value }} m/s²'
        labels:
          severity: warning
          alert_type: IMPACT_DETECTED
        data:
          - refId: A
            datasourceUid: prometheus-ds
            relativeTimeRange:
              from: 30
              to: 0
            model:
              expr: (robot_imu_accel_horiz > 8) and on(robot_id) (robot_connection_status == 1)
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: threshold
            datasourceUid: '-100'
            relativeTimeRange:
              from: 30
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [1]
                    type: gt
