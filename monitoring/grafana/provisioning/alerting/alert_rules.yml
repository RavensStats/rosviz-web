apiVersion: 1

contactPoints:
  - orgId: 1
    name: null-sink
    receivers:
      - uid: null-sink-receiver
        type: webhook
        settings:
          url: http://prometheus:9090/-/healthy
        disableResolveMessage: true

policies:
  - orgId: 1
    receiver: null-sink
    group_by: ['robot_id', 'alert_type']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 12h

groups:
  - orgId: 1
    name: robot-thresholds
    folder: Robot Monitoring
    interval: 10s
    rules:
      - uid: robot-collision-alert
        title: Robot Collision Risk
        condition: threshold
        for: 0s
        annotations:
          summary: 'Robot obstacle detected'
        labels:
          severity: critical
          alert_type: COLLISION
        data:
          - refId: A
            datasourceUid: prometheus-ds
            relativeTimeRange:
              from: 30
              to: 0
            model:
              expr: robot_min_scan_range < 0.2
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: threshold
            datasourceUid: '-100'
            relativeTimeRange:
              from: 30
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [1]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: '-100'
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: threshold
              type: threshold
        noDataState: NoData
        execErrState: Alerting

      - uid: robot-velocity-alert
        title: Robot Velocity Exceeded
        condition: threshold
        for: 0s
        annotations:
          summary: 'Robot velocity too high'
        labels:
          severity: warning
          alert_type: VELOCITY_EXCEEDED
        data:
          - refId: A
            datasourceUid: prometheus-ds
            relativeTimeRange:
              from: 30
              to: 0
            model:
              expr: robot_velocity_linear > 0.5
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: threshold
            datasourceUid: '-100'
            relativeTimeRange:
              from: 30
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [1]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: '-100'
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: threshold
              type: threshold
        noDataState: NoData
        execErrState: Alerting

      - uid: robot-tilt-alert
        title: Robot Tilt Warning
        condition: threshold
        for: 0s
        annotations:
          summary: 'Robot tilt angle critical'
        labels:
          severity: critical
          alert_type: TILT_WARNING
        data:
          - refId: A
            datasourceUid: prometheus-ds
            relativeTimeRange:
              from: 30
              to: 0
            model:
              expr: robot_tilt_angle_deg > 20
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: threshold
            datasourceUid: '-100'
            relativeTimeRange:
              from: 30
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [1]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: '-100'
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: threshold
              type: threshold
        noDataState: NoData
        execErrState: Alerting

      - uid: robot-geofence-alert
        title: Robot Geofence Breach
        condition: threshold
        for: 0s
        annotations:
          summary: 'Robot outside permitted area'
        labels:
          severity: critical
          alert_type: GEOFENCE_BREACH
        data:
          - refId: A
            datasourceUid: prometheus-ds
            relativeTimeRange:
              from: 30
              to: 0
            model:
              expr: robot_geofence_status > 0
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: threshold
            datasourceUid: '-100'
            relativeTimeRange:
              from: 30
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [1]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: '-100'
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: threshold
              type: threshold
        noDataState: NoData
        execErrState: Alerting

      - uid: robot-battery-alert
        title: Robot Low Battery
        condition: threshold
        for: 0s
        annotations:
          summary: 'Robot battery low'
        labels:
          severity: warning
          alert_type: LOW_BATTERY
        data:
          - refId: A
            datasourceUid: prometheus-ds
            relativeTimeRange:
              from: 30
              to: 0
            model:
              expr: robot_battery_percentage < 20
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: threshold
            datasourceUid: '-100'
            relativeTimeRange:
              from: 30
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [1]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: '-100'
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: threshold
              type: threshold
        noDataState: NoData
        execErrState: Alerting
